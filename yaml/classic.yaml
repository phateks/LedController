esphome:
  name: led-controller-classic
  friendly_name: LED Controller Classic

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

logger:
api:
ota:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

output:
  - platform: ledc
    pin: GPIO5
    id: pwm_out
    frequency: 1000Hz

light:
  - platform: monochromatic
    name: "Classic LED"
    output: pwm_out
    id: classic_led

binary_sensor:
  - platform: gpio
    id: dim_down_btn
    pin:
      number: GPIO6
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      min_length: 50ms
      max_length: 400ms
      then:
        - light.toggle: classic_led
    on_press:
      then:
        - delay: 600ms
        - if:
            condition:
              binary_sensor.is_on: dim_down_btn
            then:
              - while:
                  condition:
                    binary_sensor.is_on: dim_down_btn
                  then:
                    - light.dim_relative:
                        id: classic_led
                        relative_brightness: -5%
                        transition_length: 0.1s
                    - delay: 0.1s

  - platform: gpio
    id: dim_up_btn
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
      inverted: true
    on_click:
      min_length: 50ms
      max_length: 400ms
      then:
        - light.toggle: classic_led
    on_press:
      then:
        - delay: 600ms
        - if:
            condition:
              binary_sensor.is_on: dim_up_btn
            then:
              - while:
                  condition:
                    binary_sensor.is_on: dim_up_btn
                  then:
                    - light.dim_relative:
                        id: classic_led
                        relative_brightness: 5%
                        transition_length: 0.1s
                    - delay: 0.1s
